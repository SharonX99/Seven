<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苏州仓库库存管理系统</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary: #1a237e; --primary-light: #283593; --success: #2e7d32; --danger: #c62828; --warning: #e65100; --bg: #f0f2f5; --card: #fff; --border: #e0e0e0; --text: #333; --text-secondary: #888; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
.header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 i { margin-right: 8px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right .badge { background: rgba(255,255,255,.15); padding: 3px 10px; border-radius: 12px; font-size: 12px; }
.content { padding: 16px 20px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
.panel { background: var(--card); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
.panel-header { padding: 10px 16px; border-bottom: 1px solid #e8e8e8; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.panel-body { padding: 14px 16px; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.stat-card { background: #f8f9ff; border-radius: 6px; padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-value.green { color: var(--success); }
.stat-value.red { color: var(--danger); }
.stat-value.blue { color: var(--primary); }
.form-group { display: flex; flex-direction: column; gap: 3px; }
.form-group label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
.form-group input, .form-group select { padding: 6px 8px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 13px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,35,126,.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-group { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; }
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #1b5e20; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #b71c1c; }
.btn-outline { background: transparent; border: 1px solid #d0d0d0; color: var(--text); }
.btn-outline:hover { background: #f5f5f5; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.entry-list { max-height: 240px; overflow-y: auto; }
.empty { text-align: center; padding: 30px 10px; color: var(--text-secondary); }
.empty i { font-size: 36px; opacity: .3; margin-bottom: 8px; display: block; }
.empty p { font-size: 13px; }
.autocomplete-wrap { position: relative; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #d0d0d0; border-top: none; border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 50; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.autocomplete-list.show { display: block; }
.ac-item { padding: 6px 10px; cursor: pointer; display: flex; gap: 8px; align-items: center; font-size: 12px; }
.ac-item:hover, .ac-item.active { background: #e8eaf6; }
.ac-code { font-weight: 600; color: var(--primary); min-width: 80px; }
.ac-prod { color: var(--text); flex: 1; }
.ac-warn { color: var(--text-secondary); font-size: 11px; }
.txn-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5; gap: 8px; }
.txn-item:last-child { border-bottom: none; }
.t-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.t-icon.in { background: #e8f5e9; color: var(--success); }
.t-icon.out { background: #ffebee; color: var(--danger); }
.t-icon.bad { background: #fff3e0; color: var(--warning); }
.t-info { flex: 1; min-width: 0; }
.t-mat { font-weight: 600; font-size: 13px; }
.t-prod { font-size: 11px; color: var(--text-secondary); }
.t-qty { font-size: 15px; font-weight: 700; min-width: 50px; text-align: right; }
.t-qty.in { color: var(--success); }
.t-qty.out { color: var(--danger); }
.t-qty.bad { color: var(--warning); }
.t-time { font-size: 10px; color: var(--text-secondary); }
.t-del { color: #ccc; cursor: pointer; padding: 2px 4px; font-size: 11px; }
.t-del:hover { color: var(--danger); }
.search-box { position: relative; }
.search-box i { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 12px; }
.search-box input { width: 100%; padding: 4px 8px 4px 26px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 12px; outline: none; }
.search-box input:focus { border-color: var(--primary); }
.table-scroll { overflow-x: auto; }
.table-scroll table { width: 100%; border-collapse: collapse; white-space: nowrap; }
.table-scroll th { background: #f5f5f5; padding: 6px 8px; font-size: 11px; color: var(--text-secondary); font-weight: 600; text-align: center; border-bottom: 2px solid #e0e0e0; position: sticky; top: 0; }
.table-scroll td { padding: 5px 8px; font-size: 12px; text-align: center; border-bottom: 1px solid #f0f0f0; }
.table-scroll tr:hover td { background: #f8f9ff; }
.table-scroll tr.status-danger td { background: #fff5f5; }
.pagination { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 8px; border-top: 1px solid #e8e8e8; flex-wrap: wrap; }
.pagination .page-btn { padding: 3px 9px; border: 1px solid #d0d0d0; border-radius: 3px; cursor: pointer; font-size: 11px; background: #fff; }
.pagination .page-btn:hover { background: #e8eaf6; }
.pagination .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.pagination .page-btn:disabled { opacity: .4; cursor: default; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.toolbar-inline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.filter-wrap { position: relative; display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
.filter-icon { font-size: 10px; color: var(--text-secondary); }
.filter-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #d0d0d0; border-radius: 4px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 60; max-height: 200px; overflow-y: auto; min-width: 160px; display: none; padding: 4px; }
.filter-dropdown.show { display: block; }
.filter-dropdown .fd-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; cursor: pointer; font-size: 12px; border-radius: 3px; }
.filter-dropdown .fd-item:hover { background: #e8eaf6; }
.filter-dropdown .fd-actions { display: flex; gap: 4px; margin-top: 4px; padding-top: 4px; border-top: 1px solid #eee; }
.filter-tag { background: var(--primary); color: #fff; font-size: 10px; padding: 0 5px; border-radius: 8px; display: inline-block; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 10px; padding: 24px; min-width: 360px; max-width: 500px; box-shadow: 0 8px 30px rgba(0,0,0,.15); }
.modal-box h3 { margin-bottom: 16px; font-size: 16px; }
.modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.warning-edit { width: 60px; padding: 2px 4px; border: 1px solid #d0d0d0; border-radius: 3px; font-size: 12px; text-align: center; }
.warning-edit:focus { border-color: var(--primary); outline: none; }
.data-version { font-size: 11px; color: var(--text-secondary); padding: 2px 8px; background: rgba(255,255,255,.1); border-radius: 4px; }
</style>
</head>
<body>

<div id="errorBanner" style="display:none;background:#c62828;color:white;padding:10px 20px;font-size:13px;text-align:center;position:sticky;top:52px;z-index:99"></div>
<div class="header">
  <h1><i class="fas fa-warehouse"></i> 苏州仓库库存管理系统</h1>
  <div class="header-right">
    <span class="badge"><i class="far fa-calendar-alt"></i> <span id="currentDate"></span></span>
    <span class="badge"><i class="fas fa-database"></i> 本地存储</span>
    <span class="data-version" id="dataVersion"></span>
    <button class="btn btn-outline btn-sm" onclick="exportAllData()" style="color:white;border-color:rgba(255,255,255,.3)"><i class="fas fa-download"></i> 导出备份</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFileInput').click()" style="color:white;border-color:rgba(255,255,255,.3)"><i class="fas fa-upload"></i> 导入备份</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importBackup(event)">
  </div>
</div>

<div class="content">

<!-- ===== 顶部统计 ===== -->
<div class="stats-row" id="topStats"></div>

<!-- ===== Panel 1: 出入录入 ===== -->
<div class="panel panel-1">
  <div class="panel-header">
    <span><i class="fas fa-pen" style="color:var(--success)"></i> 出入录入</span>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="count" style="font-weight:400;color:var(--text-secondary);font-size:12px">数据存于本地浏览器</span>
      <button class="btn btn-outline btn-sm" onclick="showPendingCorrect()" style="font-size:10px;padding:2px 8px"><i class="fas fa-edit"></i> 待补正 <span id="pendingBadge" style="display:none;background:var(--danger);color:white;border-radius:8px;padding:0 5px;font-size:10px;margin-left:2px">0</span></button>
    </div>
  </div>
  <div class="panel-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label>物料编码 <span style="color:var(--text-secondary);font-weight:400">(可选)</span></label>
        <div class="autocomplete-wrap">
          <input type="text" id="entryMatCode" placeholder="搜索或输入物料编码..." autocomplete="off">
          <div class="autocomplete-list" id="acList"></div>
        </div>
      </div>
      <div class="form-group">
        <label>产品代码 <span style="color:var(--danger)">*</span></label>
        <div class="autocomplete-wrap">
          <input type="text" id="entryProdCode" placeholder="输入产品代码..." autocomplete="off">
          <div class="autocomplete-list" id="acProdList"></div>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>类型</label>
        <select id="entryType">
          <option value="入库">入库</option>
          <option value="出库">出库</option>
          <option value="不良">不良</option>
        </select>
      </div>
      <div class="form-group">
        <label>数量 <span style="color:var(--danger)">*</span></label>
        <input type="number" id="entryQty" min="1" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;gap:6px">
        <button class="btn btn-success" onclick="submitEntry()" style="flex:1"><i class="fas fa-check"></i> 提交录入</button>
        <button class="btn btn-outline" onclick="clearEntryForm()"><i class="fas fa-undo"></i> 清空</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid #eee;margin:12px 0">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-title" style="margin-bottom:0"><i class="fas fa-clock"></i> 已录入记录</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="renderEntryList()"><i class="fas fa-sync"></i> 刷新</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllEntries()"><i class="fas fa-trash"></i> 清空今日</button>
      </div>
    </div>
    <div id="entryList" class="entry-list">
      <div class="empty"><i class="fas fa-inbox"></i><p>暂无录入</p></div>
    </div>
  </div>
</div>

<!-- ===== Panel 5: 缺口汇总 ===== -->
<div class="panel panel-5">
  <div class="panel-header">
    <span><i class="fas fa-exclamation-circle" style="color:var(--danger)"></i> 缺口汇总</span>
    <div class="toolbar-inline" style="margin-bottom:0">
      <input type="date" id="gapDate">
      <button class="btn btn-primary btn-sm" onclick="loadGapSummary()"><i class="fas fa-search"></i> 查询</button>
      <button class="btn btn-outline btn-sm" onclick="setTodayGap()"><i class="fas fa-calendar-check"></i> 今天</button>
      <div class="search-box" style="width:140px;margin-left:4px">
        <i class="fas fa-search"></i>
        <input type="text" id="gapSearch" placeholder="搜索物料..." oninput="renderGapSummary()" style="font-size:12px;padding:4px 8px 4px 26px">
      </div>
      <button class="btn btn-success btn-sm" onclick="exportGapExcel()"><i class="fas fa-file-excel"></i> 导出</button>
    </div>
  </div>
  <div id="gapBody" class="panel-body" style="padding:10px 16px">
    <div class="empty"><i class="fas fa-exclamation-triangle"></i><p>选择日期查看所有有缺口的物料</p></div>
  </div>
</div>

<!-- ===== Panel 2: 当日出入库汇总 ===== -->
<div class="panel panel-2">
  <div class="panel-header">
    <span><i class="fas fa-calendar-day" style="color:var(--primary)"></i> 当日出入库汇总</span>
    <div class="toolbar-inline" style="margin-bottom:0">
      <input type="date" id="dailyDate">
      <button class="btn btn-primary btn-sm" onclick="loadDaily()"><i class="fas fa-search"></i> 查询</button>
      <button class="btn btn-outline btn-sm" onclick="setTodayDaily()"><i class="fas fa-calendar-check"></i> 今天</button>
      <button class="btn btn-success btn-sm" onclick="exportDailyExcel()"><i class="fas fa-file-excel"></i> 导出</button>
    </div>
  </div>
  <div class="panel-body" style="padding:10px 16px">
    <div id="dailySummary" style="display:none">
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">
        <div class="stat-card" style="padding:8px 10px"><div class="stat-label">入库项数</div><div class="stat-value green" id="dailyInCount">0</div></div>
        <div class="stat-card" style="padding:8px 10px"><div class="stat-label">出库项数</div><div class="stat-value red" id="dailyOutCount">0</div></div>
        <div class="stat-card" style="padding:8px 10px"><div class="stat-label">交易笔数</div><div class="stat-value blue" id="dailyTotalCount">0</div></div>
        <div class="stat-card" style="padding:8px 10px;background:#f0f4ff"><div class="stat-label">净变动</div><div class="stat-value" id="dailyNetChange" style="color:var(--primary)">0</div></div>
      </div>
    </div>
    <div id="dailyContent" class="empty"><i class="fas fa-calendar-day"></i><p>选择日期查看当日出入库变动</p></div>
  </div>
</div>

<!-- ===== Panel 3: 库存变动明细 ===== -->
<div class="panel panel-3">
  <div class="panel-header">
    <span><i class="fas fa-list" style="color:var(--warning)"></i> 库存变动明细</span>
    <div class="toolbar-inline" style="margin-bottom:0">
      <span style="font-size:12px;color:var(--text-secondary)">从</span>
      <input type="date" id="detailStartDate" style="width:130px;font-size:12px;padding:4px 6px">
      <span style="font-size:12px;color:var(--text-secondary)">至</span>
      <input type="date" id="detailEndDate" style="width:130px;font-size:12px;padding:4px 6px">
      <button class="btn btn-primary btn-sm" onclick="loadStockDetail()"><i class="fas fa-search"></i> 查询</button>
      <button class="btn btn-outline btn-sm" onclick="setTodayRange()"><i class="fas fa-calendar-check"></i> 今天</button>
      <div class="search-box" style="width:140px;margin-left:4px">
        <i class="fas fa-search"></i>
        <input type="text" id="detailSearch" placeholder="搜索物料..." oninput="renderStockDetail()" style="font-size:12px;padding:4px 8px 4px 26px">
      </div>
      <button class="btn btn-success btn-sm" onclick="exportDetailExcel()"><i class="fas fa-file-excel"></i> 导出</button>
    </div>
  </div>
  <div id="detailBody" class="panel-body" style="padding:10px 16px">
    <div class="empty"><i class="fas fa-calendar-alt"></i><p>选择日期区间查看每日库存变动明细</p></div>
  </div>
  <div class="pagination" id="detailPagination"></div>
</div>

<!-- ===== Panel 4: 指定日期库存快照 ===== -->
<div class="panel panel-4">
  <div class="panel-header">
    <span><i class="fas fa-camera" style="color:var(--success)"></i> 指定日期库存快照</span>
    <div class="toolbar-inline" style="margin-bottom:0">
      <input type="date" id="snapshotDate">
      <button class="btn btn-primary btn-sm" onclick="loadSnapshot()"><i class="fas fa-search"></i> 查询</button>
      <button class="btn btn-outline btn-sm" onclick="setTodaySnapshot()"><i class="fas fa-calendar-check"></i> 今天</button>
      <button class="btn btn-success btn-sm" onclick="exportSnapshotExcel()"><i class="fas fa-file-excel"></i> 导出</button>
    </div>
  </div>
  <div id="snapshotBody" class="panel-body" style="padding:10px 16px">
    <div class="empty"><i class="fas fa-camera"></i><p>选择日期查看该日所有物料库存快照</p></div>
  </div>
</div>

</div>

<!-- ===== Panel 6: 待补正管理 ===== -->
<div class="panel panel-6" id="pendingPanel" style="display:none">
  <div class="panel-header">
    <span><i class="fas fa-edit" style="color:var(--warning)"></i> 待补正物料</span>
    <div>
      <button class="btn btn-outline btn-sm" onclick="closePendingCorrect()"><i class="fas fa-times"></i> 关闭</button>
    </div>
  </div>
  <div class="panel-body" id="pendingBody" style="padding:10px 16px">
    <div class="empty"><i class="fas fa-search"></i><p>加载中...</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ===== Confirm Modal ===== -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3><i class="fas fa-clipboard-check" style="color:var(--primary)"></i> 确认录入</h3>
    <div id="confirmContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeConfirmModal()"><i class="fas fa-times"></i> 取消</button>
      <button class="btn btn-success" onclick="doSubmitEntry()"><i class="fas fa-check"></i> 确认提交</button>
    </div>
  </div>
</div>

<script>
// ============================================================

const LS_KEY_DATA = 'sz_inventory_data';
const LS_KEY_ENTRIES = 'sz_entry_log';
const LS_KEY_WARNINGS = 'sz_warning_overrides';
const LS_KEY_EXTRA = 'sz_extra_materials';
const LS_KEY_VERSION = 'sz_data_version';

function getStore() {
  let data = localStorage.getItem(LS_KEY_DATA);
  if (data) return JSON.parse(data);
  // 首次使用，写入初始化数据
  localStorage.setItem(LS_KEY_DATA, JSON.stringify(INIT_INVENTORY_DATA));
  localStorage.setItem(LS_KEY_ENTRIES, JSON.stringify(INIT_ENTRY_LOG));
  localStorage.setItem(LS_KEY_WARNINGS, JSON.stringify(INIT_WARNING_OVERRIDES));
  localStorage.setItem(LS_KEY_EXTRA, JSON.stringify(INIT_EXTRA_MATERIALS));
  localStorage.setItem(LS_KEY_VERSION, new Date().toISOString());
  return INIT_INVENTORY_DATA;
}

function saveData(data) { localStorage.setItem(LS_KEY_DATA, JSON.stringify(data)); }
function loadData() { return JSON.parse(localStorage.getItem(LS_KEY_DATA) || 'null') || INIT_INVENTORY_DATA; }

function getEntries() { return JSON.parse(localStorage.getItem(LS_KEY_ENTRIES) || JSON.stringify(INIT_ENTRY_LOG)); }
function saveEntries(el) { localStorage.setItem(LS_KEY_ENTRIES, JSON.stringify(el)); }

function getWarnings() { return JSON.parse(localStorage.getItem(LS_KEY_WARNINGS) || '{}'); }
function saveWarnings(w) { localStorage.setItem(LS_KEY_WARNINGS, JSON.stringify(w)); }

function getExtra() { return JSON.parse(localStorage.getItem(LS_KEY_EXTRA) || '{}'); }
function saveExtra(e) { localStorage.setItem(LS_KEY_EXTRA, JSON.stringify(e)); }

function getAllMaterials() {
  const data = loadData();
  const materials = {};
  if (data && data.materials) Object.assign(materials, data.materials);
  const extra = getExtra();
  Object.assign(materials, extra);
  return materials;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  if (type === 'success') t.style.background = '#2e7d32';
  else if (type === 'error') t.style.background = '#c62828';
  else t.style.background = '#333';
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getToday() { return new Date().toISOString().split('T')[0]; }

function parseDate(d) {
  if (!d) return new Date();
  const parts = d.split('-');
  return new Date(+parts[0], +parts[1] - 1, +parts[2]);
}

let _selectedMatCode = '';
let _selectedProdCode = '';

function loadMaterials() {
  allMaterials = getAllMaterials();
  matList = Object.values(allMaterials);
  document.getElementById('totalMaterials').textContent = matList.length;
}

function setupAutocomplete() {
  const matInput = document.getElementById('entryMatCode');
  const prodInput = document.getElementById('entryProdCode');
  const matListEl = document.getElementById('acList');
  const prodListEl = document.getElementById('acProdList');

  setupSingleAutocomplete(matInput, matListEl, function(item) {
    selectMaterial(item.material_code, item.product_code);
  });
  setupSingleAutocomplete(prodInput, prodListEl, function(item) {
    selectMaterial(item.material_code, item.product_code);
  });

  prodInput.addEventListener('input', function() {
    if (_selectedProdCode && this.value !== _selectedProdCode) {
      _selectedMatCode = '';
      _selectedProdCode = '';
      document.getElementById('entryMatCode').value = '';
    }
  });
}

function setupSingleAutocomplete(input, list, onSelect) {
  input.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { list.classList.remove('show'); return; }
    const matches = matList.filter(m =>
      m.material_code.toLowerCase().includes(q) ||
      m.product_code.toLowerCase().includes(q)
    ).slice(0, 20);
    if (matches.length === 0) { list.classList.remove('show'); return; }
    acActiveIndex = -1;
    list.innerHTML = matches.map((m, i) =>
      `<div class="ac-item" data-code="${m.material_code}" data-prod="${m.product_code}" data-warn="${m.warning}">
        <span class="ac-code">${m.material_code}</span>
        <span class="ac-prod">${m.product_code}</span>
        <span class="ac-warn">预警:${m.warning}</span>
      </div>`
    ).join('');
    list.classList.add('show');
    if (matches.length === 1 && (matches[0].material_code.toLowerCase() === q || matches[0].product_code.toLowerCase() === q)) {
      onSelect(matches[0]);
      list.classList.remove('show');
    }
  });
  input.addEventListener('focus', function() {
    if (this.value.trim()) this.dispatchEvent(new Event('input'));
  });
  input.addEventListener('keydown', function(e) {
    const items = list.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1); updateActive(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acActiveIndex = Math.max(acActiveIndex - 1, -1); updateActive(items); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      const active = list.querySelector('.ac-item.active');
      if (active) active.click();
      else if (items.length === 1) items[0].click();
    }
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete-wrap')) list.classList.remove('show');
  });
  list.addEventListener('click', function(e) {
    const item = e.target.closest('.ac-item');
    if (item) {
      onSelect({ material_code: item.dataset.code, product_code: item.dataset.prod, warning: item.dataset.warn });
      list.classList.remove('show');
    }
  });
}

function updateActive(items) {
  items.forEach((el, i) => {
    el.classList.toggle('active', i === acActiveIndex);
    if (i === acActiveIndex) el.scrollIntoView({ block: 'nearest' });
  });
}

function selectMaterial(code, prod) {
  _selectedMatCode = code;
  _selectedProdCode = prod;
  document.getElementById('entryMatCode').value = code;
  document.getElementById('entryProdCode').value = prod;
  document.getElementById('acList').classList.remove('show');
  document.getElementById('acProdList').classList.remove('show');
}

let _pendingEntry = null;

function submitEntry() {
  const matCode = document.getElementById('entryMatCode').value.trim();
  const prodCode = document.getElementById('entryProdCode').value.trim();
  const entryType = document.getElementById('entryType').value;
  const qty = parseInt(document.getElementById('entryQty').value);
  const date = document.getElementById('entryDate').value;

  if (!prodCode) { showToast('请输入产品代码', 'error'); return; }
  if (!qty || qty < 1) { showToast('数量必须大于0', 'error'); return; }

  _pendingEntry = { matCode, prodCode, entryType, qty, date };
  const matched = matList.find(m => m.product_code === prodCode) || matList.find(m => m.material_code === matCode);
  const matDisplay = matched ? matched.material_code : (matCode || '自动生成临时编码');

  document.getElementById('confirmContent').innerHTML = `
    <div style="background:#f8f9ff;border-radius:6px;padding:12px;font-size:13px;line-height:1.8">

      <div><strong>产品代码：</strong>${prodCode}</div>
      <div><strong>类型：</strong><span style="color:${entryType === '入库' ? 'var(--success)' : entryType === '出库' ? 'var(--danger)' : 'var(--warning)'}">${entryType}</span></div>
      <div><strong>数量：</strong>${qty}</div>
      <div><strong>日期：</strong>${date}</div>
    </div>
  `;
  document.getElementById('confirmModal').classList.add('show');
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('show');
  _pendingEntry = null;
}

function doSubmitEntry() {
  if (!_pendingEntry) return;
  const { matCode, prodCode, entryType, qty, date } = _pendingEntry;
  _pendingEntry = null;
  closeConfirmModal();

  // 处理物料
  let finalCode = matCode;
  const extra = getExtra();
  const materials = getAllMaterials();
  if (!finalCode) {
    // 自动生成临时编码
    const tempCount = Object.keys(extra).filter(k => k.startsWith('TEMP-')).length;
    finalCode = 'TEMP-' + date.replace(/-/g, '') + '-' + String(tempCount + 1).padStart(3, '0');
    extra[finalCode] = { material_code: finalCode, product_code: prodCode, warning: 0, temp: true };
    saveExtra(extra);
  } else if (!materials[finalCode]) {
    extra[finalCode] = { material_code: finalCode, product_code: prodCode, warning: 0, temp: false };
    saveExtra(extra);
  }

  // 保存录入日志
  const el = getEntries();
  const entryId = el.next_id || 1;
  if (!el.entries) el.entries = [];
  el.entries.push({
    id: entryId,
    material_code: finalCode,
    product_code: prodCode,
    type: entryType,
    quantity: qty,
    date: date
  });
  el.next_id = entryId + 1;
  saveEntries(el);

  showToast(`${entryType} ${qty} 已记录`, 'success');
  clearEntryForm();
  loadMaterials();
  loadStats();
  renderEntryList();
  loadGapSummary();
  loadDaily();
  loadStockDetail();
  loadSnapshot();
}

// ============================================================
// 缺口汇总 (Panel 5 - 放在录入下面)
// ============================================================
function computeSnapshot(dateStr) {
  const data = loadData();
  if (!data) return null;

  const monthKey = dateStr.slice(0, 7);
  const report = (data.monthly_reports || {})[monthKey] || [];
  if (report.length === 0) {
    // 尝试找上一个有数据的月份
    const months = data.months || [];
    for (let i = months.length - 1; i >= 0; i--) {
      const m = months[i];
      if (m <= monthKey && data.monthly_reports[m]) {
        return computeSnapshot(m + '-01');
      }
    }
    return null;
  }

  const txns = data.transactions || [];
  const entries = getEntries().entries || [];
  const allTxns = [...txns, ...entries];

  const monthStart = monthKey + '-01';
  // 计算该月天数
  const year = +monthKey.slice(0, 4);
  const month = +monthKey.slice(5, 7);
  const lastDay = new Date(year, month, 0).getDate();
  const dateLimit = dateStr > (monthKey + '-' + String(lastDay).padStart(2, '0')) ? (monthKey + '-' + String(lastDay).padStart(2, '0')) : dateStr;

  const periodTxns = allTxns.filter(t => t.date >= monthStart && t.date <= dateLimit);

  const periodIn = {}, periodOut = {}, periodBad = {};
  for (const t of periodTxns) {
    const code = t.material_code;
    if (t.type === '入库') periodIn[code] = (periodIn[code] || 0) + t.quantity;
    else if (t.type === '出库') periodOut[code] = (periodOut[code] || 0) + t.quantity;
    else if (t.type === '不良') periodBad[code] = (periodBad[code] || 0) + t.quantity;
  }

  const warnings = getWarnings();
  const extra = getExtra();
  const existingCodes = new Set();

  const items = report.map(item => {
    const code = item.material_code;
    existingCodes.add(code);
    const pi = periodIn[code] || 0;
    const po = periodOut[code] || 0;
    const pb = periodBad[code] || 0;
    const curBook = item.beginning_stock + pi - po;
    const curBad = (item.bad || 0) + pb;
    const curActual = Math.max(0, curBook - curBad);
    let w = item.warning || 0;
    if (warnings[code] !== undefined) w = warnings[code];
    const gap = Math.max(0, w - curActual);
    return {
      material_code: code,
      product_code: item.product_code,
      beginning_stock: item.beginning_stock,
      period_in: pi,
      period_out: po,
      period_bad: pb,
      book_stock: curBook,
      bad: curBad,
      actual_stock: curActual,
      warning: w,
      gap: gap,
      status: curActual >= w ? '库存充足' : '库存不足'
    };
  });

  // 合并新增物料
  for (const [code, mat] of Object.entries(extra)) {
    if (!existingCodes.has(code)) {
      const pi = periodIn[code] || 0;
      const po = periodOut[code] || 0;
      const pb = periodBad[code] || 0;
      const w = mat.warning || 0;
      let curBook = 0, curActual = 0;
      if (pi > 0 || po > 0 || pb > 0) {
        curBook = pi - po;
        curActual = Math.max(0, curBook - pb);
      }
      const gap = Math.max(0, w - curActual);
      items.push({
        material_code: code,
        product_code: mat.product_code || '',
        beginning_stock: 0,
        period_in: pi,
        period_out: po,
        period_bad: pb,
        book_stock: curBook,
        bad: pb,
        actual_stock: curActual,
        warning: w,
        gap: gap,
        status: '库存不足'
      });
    }
  }

  items.sort((a, b) => a.material_code.localeCompare(b.material_code));

  const totalBeginning = items.reduce((s, i) => s + i.beginning_stock, 0);
  const totalPeriodIn = items.reduce((s, i) => s + i.period_in, 0);
  const totalPeriodOut = items.reduce((s, i) => s + i.period_out, 0);
  const totalBook = items.reduce((s, i) => s + i.book_stock, 0);
  const totalActual = items.reduce((s, i) => s + i.actual_stock, 0);

  return {
    date: dateStr,
    month: monthKey,
    items: items,
    total: items.length,
    summary: {
      total_beginning: totalBeginning,
      total_period_in: totalPeriodIn,
      total_period_out: totalPeriodOut,
      total_book: totalBook,
      total_actual: totalActual
    }
  };
}

function loadGapSummary() {
  try {
  const date = document.getElementById('gapDate').value;
  if (!date) { showToast('请选择日期！', 'error'); return; }

  const snap = computeSnapshot(date);
  if (!snap) {
    document.getElementById('gapBody').innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i><p style="color:var(--danger)">该月份暂无报表数据</p></div>';
    return;
  }

  const gapItems = snap.items.filter(i => i.gap > 0);
  const totalGap = gapItems.reduce((s, i) => s + i.gap, 0);
  gapData = { date: snap.date, items: gapItems, count: gapItems.length, total_gap: totalGap };
  renderGapSummary();
  } catch(e) { console.error('loadGapSummary error:', e); }
}

      '<td style="color:var(--danger);font-weight:700;background:#fff0f0">' + item.gap.toLocaleString() + '</td>' +
    '</tr>';
  });

  html += '<tr style="background:#fff0f0;font-weight:700;border-top:2px solid var(--danger)">' +
    '<td colspan="2" style="font-weight:700">📊 合计 (' + gapData.count + ' 种物料)</td>' +
    '<td>-</td><td>-</td>' +
    '<td style="color:var(--danger);font-size:14px">' + gapData.total_gap.toLocaleString() + '</td>' +
  '</tr>';
  html += '</tbody></table></div>';
  container.innerHTML = html;

// 当日出入库汇总 (Panel 2)
// ============================================================
function loadDaily() {
  const date = document.getElementById('dailyDate').value;
  if (!date) { showToast('请选择日期！', 'error'); return; }

  const data = loadData();
  const txns = data.transactions || [];
  const entries = getEntries().entries || [];
  const allTxns = [...txns, ...entries];

  const dayTxns = allTxns.filter(t => t.date === date);
  const inCount = dayTxns.filter(t => t.type === '入库').length;
  const outCount = dayTxns.filter(t => t.type === '出库').length;
  const inQty = dayTxns.filter(t => t.type === '入库').reduce((s, t) => s + (t.quantity || 0), 0);
  const outQty = dayTxns.filter(t => t.type === '出库').reduce((s, t) => s + (t.quantity || 0), 0);

  document.getElementById('dailySummary').style.display = '';
  document.getElementById('dailyInCount').textContent = inCount;
  document.getElementById('dailyOutCount').textContent = outCount;
  document.getElementById('dailyTotalCount').textContent = dayTxns.length;
  document.getElementById('dailyNetChange').textContent = (inQty - outQty).toLocaleString();

  const container = document.getElementById('dailyContent');
  if (dayTxns.length === 0) {
    container.innerHTML = '<div class="empty"><i class="fas fa-calendar-day"></i><p>当日无交易记录</p></div>';
    return;
  }

  // 按物料分组
  const groups = {};
  for (const t of dayTxns) {
    const key = t.material_code + '|' + t.product_code;
    if (!groups[key]) groups[key] = { material_code: t.material_code, product_code: t.product_code, in: 0, out: 0, bad: 0, total: 0 };
    if (t.type === '入库') groups[key].in += t.quantity;
    else if (t.type === '出库') groups[key].out += t.quantity;
    else if (t.type === '不良') groups[key].bad += t.quantity;
    groups[key].total++;
  }

  let html = '<div class="table-scroll"><table style="font-size:12px"><thead><tr>';
  html += '<th>物料编码</th><th>产品代码</th><th>入库</th><th>出库</th><th>不良</th><th>笔数</th>';
  html += '</tr></thead><tbody>';
  for (const g of Object.values(groups)) {
    html += '<tr>' +
      '<td>' + g.material_code + '</td>' +
      '<td>' + g.product_code + '</td>' +
      '<td style="color:var(--success)">' + (g.in || '-') + '</td>' +
      '<td style="color:var(--danger)">' + (g.out || '-') + '</td>' +
      '<td style="color:var(--warning)">' + (g.bad || '-') + '</td>' +
      '<td>' + g.total + '</td>' +
    '</tr>';
  }
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

  loadDaily();
}

function loadStockDetail() {
  const startDate = document.getElementById('detailStartDate').value;
  const endDate = document.getElementById('detailEndDate').value;
  if (!startDate || !endDate) { showToast('请选择日期区间！', 'error'); return; }

  const data = loadData();
  const txns = data.transactions || [];
  const entries = getEntries().entries || [];
  const allTxns = [...txns, ...entries];
  const filtered = allTxns.filter(t => t.date >= startDate && t.date <= endDate);

  // 按日期分组
  const dailyMap = {};
  for (const t of filtered) {
    if (!dailyMap[t.date]) dailyMap[t.date] = {};
    const key = t.material_code + '|' + t.product_code;
    if (!dailyMap[t.date][key]) dailyMap[t.date][key] = { material_code: t.material_code, product_code: t.product_code, in: 0, out: 0, bad: 0 };
    if (t.type === '入库') dailyMap[t.date][key].in += t.quantity;
    else if (t.type === '出库') dailyMap[t.date][key].out += t.quantity;
    else if (t.type === '不良') dailyMap[t.date][key].bad += t.quantity;
  }

  detailData = Object.entries(dailyMap)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([date, items]) => ({
      date,
      items: Object.values(items)
    }));

  detailPage = 0;
  renderStockDetail();
}

function renderStockDetail() {
  const container = document.getElementById('detailBody');
  const pagination = document.getElementById('detailPagination');
  const searchText = document.getElementById('detailSearch').value.trim().toLowerCase();

  if (!detailData || detailData.length === 0) {
    container.innerHTML = '<div class="empty"><i class="fas fa-calendar-alt"></i><p>该日期区间无交易记录</p></div>';
    pagination.innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(detailData.length / DETAIL_PAGE_SIZE);
  const pageData = detailData.slice(detailPage * DETAIL_PAGE_SIZE, (detailPage + 1) * DETAIL_PAGE_SIZE);

  let html = '';
  for (const day of pageData) {
    const dayItems = searchText ? day.items.filter(i =>
      i.material_code.toLowerCase().includes(searchText) ||
      i.product_code.toLowerCase().includes(searchText)
    ) : day.items;

    if (dayItems.length === 0 && searchText) continue;

    html += '<div style="margin:8px 0 4px;font-size:12px;font-weight:600;color:var(--primary)"><i class="far fa-calendar-alt"></i> ' + day.date + '</div>';
    html += '<div class="table-scroll"><table style="font-size:12px"><thead><tr>';
    html += '<th>物料编码</th><th>产品代码</th><th>入库</th><th>出库</th><th>不良</th></tr></thead><tbody>';
    for (const item of dayItems) {
      const net = item.in - item.out;
      html += '<tr>' +
        '<td>' + item.material_code + '</td>' +
        '<td>' + item.product_code + '</td>' +
        '<td style="color:var(--success)">' + (item.in || '-') + '</td>' +
        '<td style="color:var(--danger)">' + (item.out || '-') + '</td>' +
        '<td style="color:var(--warning)">' + (item.bad || '-') + '</td>' +
      '</tr>';
    }
    html += '</tbody></table></div>';
  }

  container.innerHTML = html || '<div class="empty"><i class="fas fa-search"></i><p>无匹配结果</p></div>';

  // 分页
  let phtml = '';
  phtml += '<button class="page-btn" onclick="detailPage=0;renderStockDetail()" ' + (detailPage === 0 ? 'disabled' : '') + '><i class="fas fa-angle-double-left"></i></button>';
  phtml += '<button class="page-btn" onclick="detailPage=Math.max(0,detailPage-1);renderStockDetail()" ' + (detailPage === 0 ? 'disabled' : '') + '><i class="fas fa-angle-left"></i></button>';
  for (let i = Math.max(0, detailPage - 2); i <= Math.min(totalPages - 1, detailPage + 2); i++) {
    phtml += '<button class="page-btn' + (i === detailPage ? ' active' : '') + '" onclick="detailPage=' + i + ';renderStockDetail()">' + (i + 1) + '</button>';
  }
  phtml += '<button class="page-btn" onclick="detailPage=Math.min(' + (totalPages - 1) + ',detailPage+1);renderStockDetail()" ' + (detailPage >= totalPages - 1 ? 'disabled' : '') + '><i class="fas fa-angle-right"></i></button>';
  phtml += '<button class="page-btn" onclick="detailPage=' + (totalPages - 1) + ';renderStockDetail()" ' + (detailPage >= totalPages - 1 ? 'disabled' : '') + '><i class="fas fa-angle-double-right"></i></button>';
  phtml += '<span style="font-size:11px;color:var(--text-secondary);margin-left:6px">' + (detailPage + 1) + '/' + totalPages + '</span>';
  pagination.innerHTML = phtml;
}

function setTodayRange() {
  const t = getToday();
  document.getElementById('detailStartDate').value = t;
  document.getElementById('detailEndDate').value = t;
  loadStockDetail();
}

// ============================================================
// 指定日期库存快照 (Panel 4)
// ============================================================
function loadSnapshot() {
  const date = document.getElementById('snapshotDate').value;
  if (!date) { showToast('请选择日期！', 'error'); return; }

  snapshotData = computeSnapshot(date);
  if (!snapshotData) {
    document.getElementById('snapshotBody').innerHTML = '<div class="empty"><i class="fas fa-camera"></i><p style="color:var(--danger)">该月份暂无报表数据</p></div>';
    return;
  }
  renderSnapshot();
}

function renderSnapshot() {
  const container = document.getElementById('snapshotBody');
  if (!snapshotData) return;

  let items = snapshotData.items;
  const matActive = snapshotFilter.mat.length > 0;
  const prodActive = snapshotFilter.prod.length > 0;

  if (matActive) items = items.filter(i => snapshotFilter.mat.includes(i.material_code));
  if (prodActive) items = items.filter(i => snapshotFilter.prod.includes(i.product_code));

  const allMat = [...new Set(items.map(i => i.material_code))].sort();
  const allProd = [...new Set(items.map(i => i.product_code))].sort();

  let html = '<div style="margin-bottom:8px;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:10px">';
  html += '<span><i class="far fa-calendar-alt"></i> ' + snapshotData.date + ' · 共 ' + items.length + ' 种物料</span>';
  if (matActive) html += '<span class="filter-tag"><i class="fas fa-filter"></i> 物料: ' + snapshotFilter.mat.length + '项</span>';
  if (prodActive) html += '<span class="filter-tag"><i class="fas fa-filter"></i> 产品: ' + snapshotFilter.prod.length + '项</span>';
  if (matActive || prodActive) {
    html += '<button class="btn btn-outline btn-sm" onclick="snapshotFilter={mat:[],prod:[]};renderSnapshot()" style="font-size:10px;padding:2px 6px"><i class="fas fa-times"></i> 清除</button>';
  }
  html += '</div>';

  html += '<div class="table-scroll"><table style="font-size:12px"><thead><tr>';
  html += '<th>物料编码</th>';
  html += '<th>产品代码</th>';
  html += '<th>期初</th><th>期间入库</th><th>期间出库</th><th>账面库存</th><th>不良</th><th>实际库存</th>';
  html += '<th>预警</th>';
  html += '<th>缺口</th>';
  html += '</tr></thead><tbody>';

  items.forEach(function(item) {
    const isDanger = item.actual_stock <= 0;
    const hasGap = item.gap > 0;
    html += '<tr class="' + (isDanger ? 'status-danger' : '') + '">';
    html += '<td>' + item.material_code + '</td>';
    html += '<td>' + item.product_code + '</td>';
    html += '<td>' + item.beginning_stock.toLocaleString() + '</td>';
    html += '<td style="color:var(--success)">+' + item.period_in.toLocaleString() + '</td>';
    html += '<td style="color:var(--danger)">-' + item.period_out.toLocaleString() + '</td>';
    html += '<td>' + item.book_stock.toLocaleString() + '</td>';
    html += '<td>' + item.bad.toLocaleString() + '</td>';
    html += '<td><strong>' + item.actual_stock.toLocaleString() + '</strong></td>';
    html += '<td><input type="number" class="warning-edit" value="' + item.warning + '" min="0" data-code="' + item.material_code + '" style="width:60px;padding:2px 4px;border:1px solid #d0d0d0;border-radius:3px;font-size:12px;text-align:center" onchange="updateWarning(this)"></td>';
    html += '<td style="color:' + (hasGap ? 'var(--danger)' : '#ccc') + ';font-weight:' + (hasGap ? '700' : '400') + ';background:' + (hasGap ? '#fff0f0' : 'transparent') + '">' + (hasGap ? item.gap.toLocaleString() : '-') + '</td>';
    html += '</tr>';
  });

  const s = snapshotData.summary;
  html += '<tr style="background:#f0fff4;font-weight:700;border-top:2px solid var(--success)">';
  html += '<td colspan="2" style="font-weight:700">📊 合计 (' + snapshotData.total + ' 种物料)</td>';
  html += '<td>' + s.total_beginning.toLocaleString() + '</td>';
  html += '<td style="color:var(--success)">+' + s.total_period_in.toLocaleString() + '</td>';
  html += '<td style="color:var(--danger)">-' + s.total_period_out.toLocaleString() + '</td>';
  html += '<td>' + s.total_book.toLocaleString() + '</td>';
  html += '<td>-</td>';
  html += '<td><strong>' + s.total_actual.toLocaleString() + '</strong></td>';
  html += '<td colspan="2"></td>';
  html += '</tr></tbody></table></div>';

  container.innerHTML = html;
}

function updateWarning(input) {
  const matCode = input.dataset.code;
  const newVal = parseInt(input.value);
  if (isNaN(newVal) || newVal < 0) { showToast('预警值必须是非负数字', 'error'); input.value = 0; return; }

  const warnings = getWarnings();
  warnings[matCode] = newVal;
  saveWarnings(warnings);
  showToast(matCode + ' 预警已更新为 ' + newVal, 'success');
  loadSnapshot();
}

function setTodaySnapshot() {
  document.getElementById('snapshotDate').value = getToday();
  loadSnapshot();
}

function setTodayGap() {
  document.getElementById('gapDate').value = getToday();
  loadGapSummary();
}

// ============================================================
// 待补正管理 (Panel 6)
// ============================================================
function loadPendingBadge() {
  const extra = getExtra();
  const pending = Object.fromEntries(Object.entries(extra).filter(([k, v]) => v.temp || k.startsWith('TEMP-')));
  const badge = document.getElementById('pendingBadge');
  if (Object.keys(pending).length > 0) {
    badge.textContent = Object.keys(pending).length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function showPendingCorrect() {
  const panel = document.getElementById('pendingPanel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth' });

  const extra = getExtra();
  const pending = Object.fromEntries(Object.entries(extra).filter(([k, v]) => v.temp || k.startsWith('TEMP-')));
  const container = document.getElementById('pendingBody');

  if (Object.keys(pending).length === 0) {
    container.innerHTML = '<div class="empty"><i class="fas fa-check-circle" style="color:var(--success)"></i><p style="color:var(--success)">没有待补正的物料</p></div>';
    return;
  }

  let html = '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">以下为临时编码的物料，请补正为正式编码</div>';
  html += '<div class="table-scroll"><table style="font-size:12px"><thead><tr>';
  html += '<th>临时编码</th><th>产品代码</th><th>正式编码</th><th>产品代码</th><th>操作</th><th>删除</th>';
  html += '</tr></thead><tbody>';

  for (const [code, mat] of Object.entries(pending)) {
    html += '<tr>' +
      '<td><strong>' + code + '</strong></td>' +
      '<td>' + (mat.product_code || '') + '</td>' +
      '<td><input type="text" class="correct-code" value="" placeholder="正式物料编码" style="width:110px;padding:2px 4px;border:1px solid #d0d0d0;border-radius:3px;font-size:12px"></td>' +
      '<td><input type="text" class="correct-prod" value="' + (mat.product_code || '') + '" placeholder="产品代码" style="width:110px;padding:2px 4px;border:1px solid #d0d0d0;border-radius:3px;font-size:12px"></td>' +
      '<td><button class="btn btn-success btn-sm" onclick="doCorrect(\'' + code + '\', this)"><i class="fas fa-check"></i> 补正</button></td>' +
      '<td><button class="btn btn-danger btn-sm" onclick="deleteTempMaterial(\'' + code + '\')"><i class="fas fa-trash"></i></button></td>' +
    '</tr>';
  }
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function doCorrect(tempCode, btn) {
  const row = btn.closest('tr');
  const realCode = row.querySelector('.correct-code').value.trim();
  const prodCode = row.querySelector('.correct-prod').value.trim();
  if (!realCode) { showToast('请输入正式物料编码', 'error'); return; }
  if (!prodCode) { showToast('请输入产品代码', 'error'); return; }

  const materials = getAllMaterials();
  if (materials[realCode] && realCode !== tempCode) {
    showToast('物料编码 ' + realCode + ' 已存在', 'error');
    return;
  }

  const extra = getExtra();
  if (!extra[tempCode]) { showToast('临时编码不存在', 'error'); return; }

  const tempData = extra[tempCode];
  delete extra[tempCode];

  if (realCode !== tempCode) {
    extra[realCode] = {
      material_code: realCode,
      product_code: prodCode,
      warning: tempData.warning || 0,
      temp: false
    };
  } else {
    extra[tempCode] = {
      material_code: tempCode,
      product_code: prodCode,
      warning: tempData.warning || 0,
      temp: false
    };
  }
  saveExtra(extra);

  // 更新录入日志中的物料编码
  const el = getEntries();
  if (el.entries) {
    for (const e of el.entries) {
      if (e.material_code === tempCode) {
        e.material_code = realCode;
        e.product_code = prodCode;
      }
    }
    saveEntries(el);
  }

  showToast('补正成功: ' + tempCode + ' → ' + realCode, 'success');
  loadMaterials();
  loadPendingBadge();
  showPendingCorrect();
}

function deleteTempMaterial(code) {
  if (!confirm('确定删除物料 ' + code + ' 吗？\n该操作不会删除录入记录，但缺口汇总中将不再显示该物料。')) return;
  const extra = getExtra();
  delete extra[code];
  saveExtra(extra);
  showToast('已删除物料 ' + code, 'info');
  loadMaterials();
  loadPendingBadge();
  showPendingCorrect();
  loadGapSummary();
}

function closePendingCorrect() {
  document.getElementById('pendingPanel').style.display = 'none';
}

// ============================================================
// 导出 Excel (CSV 格式)
// ============================================================
function downloadCSV(filename, headers, rows) {
  const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('导出完成', 'success');
}

function exportDailyExcel() {
  const date = document.getElementById('dailyDate').value;
  if (!date) { showToast('请先选择日期！', 'error'); return; }
  const data = loadData();
  const txns = data.transactions || [];
  const entries = getEntries().entries || [];
  const allTxns = [...txns, ...entries];
  const dayTxns = allTxns.filter(t => t.date === date);
  const headers = ['物料编码', '产品代码', '类型', '数量', '日期'];
  const rows = dayTxns.map(t => [t.material_code, t.product_code, t.type, t.quantity, t.date]);
  downloadCSV('当日出入库_' + date + '.csv', headers, rows);
}

function exportDetailExcel() {
  const startDate = document.getElementById('detailStartDate').value;
  const endDate = document.getElementById('detailEndDate').value;
  if (!startDate || !endDate) { showToast('请选择日期区间！', 'error'); return; }
  const data = loadData();
  const txns = data.transactions || [];
  const entries = getEntries().entries || [];
  const allTxns = [...txns, ...entries];
  const filtered = allTxns.filter(t => t.date >= startDate && t.date <= endDate);
  const headers = ['日期', '物料编码', '产品代码', '类型', '数量'];
  const rows = filtered.map(t => [t.date, t.material_code, t.product_code, t.type, t.quantity]);
  downloadCSV('库存变动明细_' + startDate + '_' + endDate + '.csv', headers, rows);
}

function exportSnapshotExcel() {
  const date = document.getElementById('snapshotDate').value;
  if (!date) { showToast('请先选择日期！', 'error'); return; }
  const snap = computeSnapshot(date);
  if (!snap) return;
  const headers = ['物料编码', '产品代码', '期初', '期间入库', '期间出库', '账面库存', '不良', '实际库存', '预警值', '缺口'];
  const rows = snap.items.map(i => [i.material_code, i.product_code, i.beginning_stock, i.period_in, i.period_out, i.book_stock, i.bad, i.actual_stock, i.warning, i.gap]);
  downloadCSV('库存快照_' + date + '.csv', headers, rows);
}

function exportGapExcel() {
  if (!gapData) { showToast('请先查询缺口汇总', 'error'); return; }
  const headers = ['物料编码', '产品代码', '实际库存', '预警值', '缺口'];
  const rows = gapData.items.map(i => [i.material_code, i.product_code, i.actual_stock, i.warning, i.gap]);
  downloadCSV('缺口汇总_' + gapData.date + '.csv', headers, rows);
}

// ============================================================
// 备份与恢复
// ============================================================
function exportAllData() {
  const backup = {
    version: 1,
    exported_at: new Date().toISOString(),
    inventory_data: loadData(),
    entry_log: getEntries(),
    warning_overrides: getWarnings(),
    extra_materials: getExtra()
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '库存管理备份_' + getToday() + '.json';
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('备份导出成功', 'success');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version) { showToast('无效的备份文件', 'error'); return; }
      localStorage.setItem(LS_KEY_DATA, JSON.stringify(backup.inventory_data));
      localStorage.setItem(LS_KEY_ENTRIES, JSON.stringify(backup.entry_log));
      localStorage.setItem(LS_KEY_WARNINGS, JSON.stringify(backup.warning_overrides));
      localStorage.setItem(LS_KEY_EXTRA, JSON.stringify(backup.extra_materials));
      localStorage.setItem(LS_KEY_VERSION, new Date().toISOString());
      showToast('备份导入成功，刷新页面生效', 'success');
      setTimeout(() => location.reload(), 1000);
    } catch(err) {
      showToast('导入失败: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// 全局错误捕获

window.onerror = function(msg, url, line, col, err) {
  const banner = document.getElementById('errorBanner');
  if (banner) {
    banner.style.display = 'block';
    banner.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 错误: ' + (err ? err.message : msg) + ' (第' + line + '行)';
  }
  console.error('Global error:', msg, line, col, err);
};

// ============================================================

}
